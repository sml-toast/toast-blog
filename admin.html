<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>管理后台 · Toast Blog</title>
<link rel="icon" type="image/svg+xml" href="/toast-blog/logo/toast-favicon.svg">
<style>

.feedback-rail { position: fixed; right: 16px; bottom: 80px; z-index: 999; }
.feedback-btn { display: flex; align-items: center; gap: 4px; padding: 8px 14px; background: var(--accent,#0a84ff); color: #fff; border-radius: 24px; text-decoration: none; font-size: 13px; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: transform 0.2s; }
.feedback-btn:hover { transform: translateY(-2px); background: var(--accent-hover,#0a6ed1); }
.dark .feedback-btn { box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --border: #e8e8ed;
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --accent: #0071e3;
  --accent-light: #e8f0fe;
  --success: #34c759;
  --orange: #ff9500;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.10);
  --transition: all 0.3s cubic-bezier(0.25,0.1,0.25,1);
}
/* ── Skeleton Loading ── */
.skeleton { background: linear-gradient(90deg, var(--card-bg,#f0f0f0) 25%, #e0e0e0 50%, var(--card-bg,#f0f0f0) 75%); background-size: 200% 100%; animation: skeleton-shimmer 1.5s ease-in-out infinite; border-radius: 8px; }
.dark .skeleton { background: linear-gradient(90deg, var(--card-bg,#1e1e24) 25%, #2a2a30 50%, var(--card-bg,#1e1e24) 75%); background-size: 200% 100%; }
@keyframes skeleton-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.skeleton-card { height: 180px; margin-bottom: 16px; }
.skeleton-line { height: 14px; margin-bottom: 8px; width: 60%; }
.skeleton-line.short { width: 40%; }


* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;

  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Navigation ── */
nav {
  position: fixed; top:0; left:0; right:0;
  background: rgba(255,255,255,0.80);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  padding: 0 40px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
nav .logo { font-weight: 700; font-size: 18px; color: var(--accent); letter-spacing: -0.3px; }
nav .logo span { color: var(--text); }
nav ul { -webkit-tap-highlight-color: transparent; display: flex; gap: 32px; list-style: none; }
nav ul li a {
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  transition: var(--transition);
  position: relative;
}
nav ul li a::after {
  content: ''; position: absolute; bottom: -18px; left: 0; right: 0;
  height: 2px; background: var(--accent);
  transform: scaleX(0); transition: var(--transition);
}
nav ul li a:hover, nav ul li a.active { color: var(--text); }
nav ul li a:hover::after, nav ul li a.active::after { transform: scaleX(1); }

/* ── Layout ── */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
section { padding: 100px 0 80px; }
.section-label {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 2px; color: var(--accent); margin-bottom: 8px;
}
.section-title {
  font-size: 36px; font-weight: 700; letter-spacing: -0.5px;
  margin-bottom: 16px;
}
.section-desc {
  font-size: 16px; color: var(--text-secondary);
  max-width: 600px; margin-bottom: 48px;
}

/* ── Hero / Profile ── */
.hero {
  min-height: 100vh;
  display: flex; align-items: center;
  padding-top: 60px;
  background: linear-gradient(180deg, #f0f4ff 0%, var(--bg) 100%);
}
.hero .container { display: flex; align-items: center; gap: 80px; padding-top: 40px; }
.hero-avatar {
  flex-shrink: 0;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #5856d6);
  display: flex; align-items: center; justify-content: center;
  font-size: 64px; color: #fff; font-weight: 700;
  box-shadow: 0 12px 40px rgba(0,113,227,0.25);
  position: relative;
}
.hero-avatar .status-dot {
  position: absolute; bottom: 12px; right: 12px;
  width: 24px; height: 24px; background: var(--success);
  border: 3px solid #fff; border-radius: 50%;
}
.hero-content h1 {
  font-size: 52px; font-weight: 800; letter-spacing: -1px;
  margin-bottom: 8px; line-height: 1.1;
}
.hero-content h1 span { color: var(--accent); }
.hero-content .tagline {
  font-size: 20px; color: var(--text-secondary);
  margin-bottom: 24px; font-weight: 400;
}
.hero-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
.hero-tags span {
  padding: 6px 14px; border-radius: 20px;
  background: #1e4a7a; color: #fff;
  font-size: 13px; font-weight: 500;
}
.nav a { padding: 12px 16px; -webkit-tap-highlight-color: transparent; }
.hero-actions { display: flex; gap: 12px; }
.btn { min-height: 44px; min-width: 44px;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 24px; border-radius: 24px;
  font-size: 14px; font-weight: 600;
  text-decoration: none; cursor: pointer; border: none;
  transition: var(--transition);
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #0062c4; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,113,227,0.35); }
.btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

/* ── Resume Section ── */
.resume-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.resume-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 32px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.resume-card h3 {
  font-size: 16px; font-weight: 600; margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}
.resume-card h3 .icon { color: var(--accent); }
.resume-card ul { list-style: none; }
.resume-card li {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.resume-card li:last-child { border-bottom: none; }
.resume-card li .date {
  font-size: 12px; color: var(--text-secondary);
  display: block; margin-bottom: 2px;
}
.resume-card li .title { font-weight: 600; }
.resume-card li .org { color: var(--text-secondary); font-size: 13px; }
.skills-pills {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.skills-pills span {
  padding: 6px 14px; border-radius: 8px;
  background: var(--bg); font-size: 13px; font-weight: 500;
  border: 1px solid var(--border);
}

/* ── Workspace / Portfolio ── */
.workspace-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px;
}
.workspace-filters {
  display: flex; gap: 8px;
}
.workspace-filters button {
  padding: 8px 16px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: var(--transition);
}
.workspace-filters button.active,
.workspace-filters button:hover {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.project-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.project-card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: var(--transition);
  cursor: pointer;
}
.project-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.project-thumb {
  width: 100%; height: 200px;
  background: linear-gradient(135deg, #e0e7ff, #f0e6ff);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
}

.pt-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(transparent, rgba(0,0,0,0.12));
  pointer-events: none;
}

.pt-pattern {
  position: absolute;
  inset: 0;
  opacity: 0.08;
  background-image:
    radial-gradient(circle at 20% 30%, currentColor 1px, transparent 1px),
    radial-gradient(circle at 80% 70%, currentColor 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}

.project-body { padding: 20px; }
.project-body .tag {
  display: inline-block;
  padding: 2px 10px; border-radius: 4px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  background: var(--accent-light); color: var(--accent);
  margin-bottom: 8px;
}
.project-body h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.project-body p { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; }
.project-tech {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.project-tech span {
  padding: 2px 8px; border-radius: 4px;
  background: var(--bg); font-size: 11px; font-weight: 500;
  border: 1px solid var(--border);
}

/* ── Project Detail Modal ── */
.modal-overlay {
  position: fixed; inset:0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  align-items: center; justify-content: center;
  padding: 40px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  max-width: 720px; width: 100%;
  max-height: 85vh; overflow-y: auto;
  padding: 40px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.2);
  position: relative;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: var(--bg);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.modal-close:hover { background: var(--border); }
.modal-thumb {
  width: 100%; height: 240px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #e0e7ff, #f0e6ff);
  display: flex; align-items: center; justify-content: center;
  font-size: 56px; margin-bottom: 24px;
}
.modal h2 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
.modal .modal-meta {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin-bottom: 24px;
}
.modal .modal-meta a, .modal .modal-meta span {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 13px; color: var(--accent); text-decoration: none;
}
.modal .modal-meta span { color: var(--text-secondary); }
.modal .modal-desc {
  font-size: 15px; color: var(--text-secondary);
  line-height: 1.8; margin-bottom: 24px;
}
.modal .modal-tech-stack {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
}
.modal .modal-tech-stack span {
  padding: 6px 14px; border-radius: 8px;
  background: var(--bg); font-size: 13px; font-weight: 500;
  border: 1px solid var(--border);
}
.modal .modal-links {
  display: flex; gap: 12px;
}

/* ── AI Tutorials ── */
.tutorials-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-bottom: 60px;
}
.tutorial-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: var(--transition);
}
.tutorial-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.tutorial-card .icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin-bottom: 16px;
}
.tutorial-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.tutorial-card p { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
.tutorial-card .difficulty {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  padding: 2px 10px; border-radius: 4px;
  display: inline-block;
}
.difficulty.beginner { background: #e8f5e9; color: #2e7d32; }
.difficulty.intermediate { background: #fff3e0; color: #e65100; }
.difficulty.advanced { background: #fce4ec; color: #c62828; }

/* ── Learning Path ── */
.path-section-title {
  font-size: 22px; font-weight: 700; margin-bottom: 32px;
  text-align: center;
}
.learning-path {
  position: relative;
  max-width: 780px; margin: 0 auto;
}
.learning-path::before {
  content: ''; position: absolute; left: 24px; top: 0; bottom: 0;
  width: 2px; background: linear-gradient(180deg, var(--accent), #5856d6);
}
.path-step {
  position: relative; padding: 0 0 32px 64px;
}
.path-step:last-child { padding-bottom: 0; }
.path-step .dot {
  position: absolute; left: 16px; top: 4px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent); border: 3px solid #fff;
  box-shadow: 0 0 0 2px var(--accent);
  z-index: 1;
}
.path-step.completed .dot { background: var(--success); box-shadow: 0 0 0 2px var(--success); }
.path-step .step-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--accent); margin-bottom: 4px;
}
.path-step h4 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.path-step p { font-size: 14px; color: var(--text-secondary); }
.path-step .step-tech {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;
}
.path-step .step-tech span {
  padding: 2px 8px; border-radius: 4px;
  background: var(--bg); font-size: 11px; font-weight: 500;
  border: 1px solid var(--border);
}

/* ── Footer ── */
footer {
  border-top: 1px solid var(--border);
  padding: 32px 0;
  text-align: center;
  font-size: 13px; color: var(--text-secondary);
}

/* ── Repo badge on card ── */
.project-card .repo-badge {
  position: absolute;
  bottom: 8px; right: 8px;
  display: flex; gap: 4px;
}
.project-card .repo-badge a {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(4px);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; text-decoration: none;
  transition: var(--transition);
  color: var(--text-secondary);
}
.project-card .repo-badge a:hover {
  background: #fff;
  color: var(--accent);
  border-color: var(--accent);
  transform: scale(1.1);
}
.project-thumb { position: relative; }

.modal .modal-links .btn-repo-github {
  border-color: #24292e;
  color: #24292e;
}
.modal .modal-links .btn-repo-github:hover {
  background: #24292e;
  color: #fff;
}
.modal .modal-links .btn-repo-gitee {
  border-color: #c71d23;
  color: #c71d23;
}
.modal .modal-links .btn-repo-gitee:hover {
  background: #c71d23;
  color: #fff;
}


/* ── Wiki ── */
.wiki-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px;
}
.wiki-categories {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.wiki-categories button {
  padding: 8px 16px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: var(--transition);
}
.wiki-categories button.active,
.wiki-categories button:hover {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.wiki-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.wiki-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: var(--transition);
  cursor: default;
}
.wiki-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}
.wiki-card .wiki-cat {
  display: inline-block;
  padding: 2px 10px; border-radius: 4px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  background: var(--accent-light); color: var(--accent);
  margin-bottom: 10px;
}
.wiki-card .wiki-date {
  font-size: 12px; color: var(--text-secondary);
  display: block; margin-bottom: 4px;
}
.wiki-card h3 {
  font-size: 16px; font-weight: 600; margin-bottom: 8px;
  line-height: 1.4;
}
.wiki-card p {
  font-size: 13px; color: var(--text-secondary);
  margin-bottom: 12px; line-height: 1.6;
}
.wiki-card .wiki-tags {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.wiki-card .wiki-tags span {
  padding: 2px 8px; border-radius: 4px;
  background: var(--bg); font-size: 11px; font-weight: 500;
  border: 1px solid var(--border);
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .hero .container { flex-direction: column; text-align: center; gap: 32px; }
  .hero-avatar { width: 140px; height: 140px; font-size: 48px; }
  .hero-content h1 { font-size: 36px; }
  .hero-tags, .nav a { padding: 12px 16px; -webkit-tap-highlight-color: transparent; }
.hero-actions { justify-content: center; }
  .resume-grid { grid-template-columns: 1fr; }
  .project-grid { grid-template-columns: 1fr 1fr; }
  .tutorials-grid { grid-template-columns: 1fr 1fr; }
  .wiki-grid { grid-template-columns: 1fr 1fr; }
  .section-title { font-size: 28px; }
}
@media (max-width: 600px) {
  nav { padding: 0 16px; }
  nav ul { -webkit-tap-highlight-color: transparent; gap: 16px; }
  nav ul li a { font-size: 12px; }
  .container { padding: 0 16px; }
  .project-grid { grid-template-columns: 1fr; }
  .tutorials-grid { grid-template-columns: 1fr; }
  .wiki-grid { grid-template-columns: 1fr; }
  section { padding: 60px 0 40px; }
}

/* ══════════════════════════════════════════════
   1. DARK MODE
   ══════════════════════════════════════════════ */
[data-theme="dark"] {
  --bg: #000000;
  --surface: #1c1c1e;
  --border: #38383a;
  --text: #f5f5f7;
  --text-secondary: #98989d;
  --accent: #0a84ff;
  --accent-light: #1c3a5e;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
}

[data-theme="dark"] nav {
  background: rgba(28,28,30,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
}

[data-theme="dark"] .hero {
  background: linear-gradient(180deg, #1a1a2e 0%, var(--bg) 100%);
}

[data-theme="dark"] .hero-avatar {
  box-shadow: 0 12px 40px rgba(10,132,255,0.25);
}

[data-theme="dark"] .project-thumb .repo-badge a {
  background: rgba(44,44,46,0.92);
}

[data-theme="dark"] .modal .modal-links .btn-repo-github {
  border-color: #8b949e;
  color: #8b949e;
}
[data-theme="dark"] .modal .modal-links .btn-repo-github:hover {
  background: #30363d;
  color: #fff;
}
[data-theme="dark"] .modal .modal-links .btn-repo-gitee {
  border-color: #f85149;
  color: #f85149;
}
[data-theme="dark"] .modal .modal-links .btn-repo-gitee:hover {
  background: #da3633;
  color: #fff;
}

/* ── Theme Toggle ── */
.theme-toggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 100;
}

.theme-toggle:hover {
  transform: scale(1.1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}

/* ══════════════════════════════════════════════
   2. ENTRANCE ANIMATION
   ══════════════════════════════════════════════ */
.card-enter {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.card-enter.animate-in {
  opacity: 1;
  transform: translateY(0);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ══════════════════════════════════════════════
   3. BACK TO TOP
   ══════════════════════════════════════════════ */
.back-to-top {
  position: fixed;
  bottom: 80px;
  right: 24px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 18px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.3s, transform 0.3s;
  z-index: 99;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
}

.back-to-top.visible {
  opacity: 1;
  transform: translateY(0);
}

.back-to-top:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ══════════════════════════════════════════════
   4. MOBILE HAMBURGER
   ══════════════════════════════════════════════ */
.hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
}

.hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: transform 0.2s, opacity 0.2s;
}

.hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

@media (max-width: 768px) {
  .hamburger { display: flex; }

  nav ul { -webkit-tap-highlight-color: transparent;
    position: fixed;
    top: 60px;
    left: 0;
    right: 0;
    flex-direction: column;
    background: var(--surface);
    padding: 16px 24px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    transform: translateY(-100%);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 99;
  }

  nav ul.open {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  nav ul li a {
    display: block;
    padding: 10px 0;
  }

  nav ul li a::after { display: none; }

  nav ul li a.active,
  nav ul li a:hover {
    color: var(--accent);
  }
}

/* ── Wiki Modal Markdown 样式 ── */
.modal-desc h2 {
  font-size: 20px;
  font-weight: 700;
  margin: 20px 0 12px;
  color: var(--text);
}

.modal-desc h3 {
  font-size: 17px;
  font-weight: 600;
  margin: 16px 0 8px;
  color: var(--text);
}

.modal-desc strong {
  font-weight: 700;
  color: var(--text);
}

.modal-desc code {
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 13px;
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
}

.modal-desc pre {
  background: #1e1e2e;
  border-radius: 8px;
  padding: 16px;
  margin: 12px 0;
  overflow-x: auto;
}

.modal-desc pre code {
  background: none;
  border: none;
  color: #cdd6f4;
  font-size: 13px;
  line-height: 1.6;
  padding: 0;
}

.modal-desc ul {
  margin: 8px 0;
  padding-left: 20px;
}

.modal-desc li {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-secondary);
}

/* ── Encrypted Info Fields ── */
.resume-encrypted {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 32px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
}

.encrypted-field {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}

.enc-label {
  font-weight: 500;
  color: var(--text-secondary);
  min-width: 56px;
}

.enc-value {
  font-weight: 600;
  color: var(--text);
  transition: all 0.3s;
  font-family: var(--font-mono, 'JetBrains Mono', monospace);
  letter-spacing: 2px;
}

.enc-value.enc-hidden {
  color: var(--text-secondary);
  filter: blur(5px);
  cursor: pointer;
  user-select: none;
}

.enc-value.enc-visible {
  color: var(--text);
  filter: none;
  letter-spacing: normal;
}

.enc-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
  line-height: 1;
}

.enc-toggle:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}

/* ── Resume Preview Bar ── */
.resume-preview-bar {
  display: flex;
  gap: 12px;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

/* ── Resume Preview Modal ── */
.resume-preview-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  z-index: 300;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}

.resume-preview-overlay.open {
  display: flex;
}

.resume-preview-modal {
  background: #fff;
  border-radius: 12px;
  max-width: 820px;
  width: 100%;
  margin: 20px auto 40px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.25);
  overflow: hidden;
}

[data-theme="dark"] .resume-preview-modal {
  background: #1c1c1e;
  border: 1px solid var(--border);
}

.resume-preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid #e8e8ed;
  background: #fafafa;
  position: sticky;
  top: 0;
  z-index: 1;
}

[data-theme="dark"] .resume-preview-header {
  background: #2c2c2e;
  border-color: var(--border);
}

.preview-title {
  font-size: 16px;
  font-weight: 600;
}

.resume-preview-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}

.resume-preview-close:hover {
  background: var(--border);
}

.resume-preview-body {
  padding: 32px;
  font-size: 14px;
  line-height: 1.7;
  color: #1d1d1f;
}

[data-theme="dark"] .resume-preview-body {
  color: #f5f5f7;
}

/* ── Preview Sections ── */
.preview-section {
  margin-bottom: 28px;
}

.preview-section-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  border-bottom: 2px solid var(--accent);
  padding-bottom: 6px;
  margin-bottom: 14px;
}

.preview-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.preview-info-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
}

.pi-label {
  font-weight: 500;
  color: var(--text-secondary);
  min-width: 60px;
}

.pi-value {
  font-weight: 600;
}

.preview-text {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-secondary);
}

/* ── Skills ── */
.preview-skills {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.preview-skill-group {
  display: flex;
  gap: 12px;
  font-size: 13px;
  line-height: 1.6;
}

.sg-label {
  min-width: 80px;
  font-weight: 600;
  color: var(--text);
  flex-shrink: 0;
}

.preview-skill-group span:last-child {
  color: var(--text-secondary);
}

/* ── Jobs ── */
.preview-job {
  padding: 16px;
  background: #f5f5f7;
  border-radius: 8px;
  margin-bottom: 12px;
}

[data-theme="dark"] .preview-job {
  background: #2c2c2e;
}

.pj-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}

.pj-date {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
}

.pj-company {
  font-size: 13px;
  font-weight: 600;
}

.pj-title {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 8px;
}

.pj-duties {
  list-style: disc;
  padding-left: 18px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* ── Education ── */
.preview-edu {
  padding: 12px 16px;
  background: #f5f5f7;
  border-radius: 8px;
}

[data-theme="dark"] .preview-edu {
  background: #2c2c2e;
}

/* ── Preview encrypt toggle reuse ── */
.resume-preview-body .enc-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0 5px;
  cursor: pointer;
  font-size: 11px;
  line-height: 20px;
  transition: all 0.2s;
}

.resume-preview-body .enc-toggle:hover {
  border-color: var(--accent);
}

.resume-preview-body .enc-hidden {
  filter: blur(5px);
  user-select: none;
  letter-spacing: 2px;
  color: var(--text-secondary);
}

.resume-preview-body .enc-visible {
  filter: none;
  letter-spacing: normal;
  color: var(--text);
}

/* ── Print Styles ── */
@media print {
  .resume-preview-overlay {
    position: static !important;
    background: none !important;
    backdrop-filter: none !important;
    padding: 0 !important;
    display: block !important;
    overflow: visible !important;
  }

  .resume-preview-modal {
    max-width: 100% !important;
    box-shadow: none !important;
    margin: 0 !important;
    border-radius: 0 !important;
    border: none !important;
  }

  .resume-preview-header {
    display: none !important;
  }

  .resume-preview-body {
    padding: 15px !important;
  }

  .enc-toggle {
    display: none !important;
  }

  .enc-hidden {
    filter: none !important;
    letter-spacing: normal !important;
    color: #000 !important;
  }



  /* 强制隐藏非预览元素 */
  nav, footer, .feedback-rail, .back-to-top, .theme-toggle-btn,
  .hero, #workspace, #tutorials, #wiki, #learning-path, #comments,
  section:not(.resume-preview-overlay) {
    display: none !important;
  }

  /* 预览内元素排版优化 */
  .preview-section { page-break-inside: avoid; }
  .preview-job { page-break-inside: avoid; margin-bottom: 12px; }


  @page {
    margin: 0;
  }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

/* ── Hero Social Links ── */
.hero-social {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.social-link {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  transition: all 0.25s;
  text-decoration: none;
}

.social-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
  transform: translateY(-2px);
}

[data-theme="dark"] .social-link {
  border-color: #38383a;
}

[data-theme="dark"] .social-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: #1c3a5e;
}

@media (max-width: 768px) {
  .hero-social {
    justify-content: center;
  }
}

/* ── Avatar Initials ── */
.hero-avatar__initials {
  font-size: 32px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 2px;
}


/* ── Logo ── */
.logo svg { display: inline; }
.hidden { display: none !important; }

/* ── Language Switcher ── */
.lang-switcher {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 13px;
  transition: all 0.2s;
  user-select: none;
  position: relative;
  color: var(--text-secondary);
}
.lang-switcher:hover { background: rgba(0,0,0,0.05); }
[data-theme="dark"] .lang-switcher:hover { background: rgba(255,255,255,0.08); }

.lang-switcher .lang-flag { font-size: 18px; line-height: 1; }
.lang-switcher .lang-name { font-weight: 500; }

.lang-dropdown {
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  min-width: 140px;
  display: none;
  z-index: 200;
  overflow: hidden;
}
.lang-dropdown.open { display: block; }
.lang-dropdown-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  color: var(--text);
}
.lang-dropdown-item:hover { background: var(--accent-light); }
.lang-dropdown-item.active { background: var(--accent-light); font-weight: 600; color: var(--accent); }
.lang-dropdown-item .lflag { font-size: 20px; }
.lang-dropdown-item .lcheck { margin-left: auto; opacity: 0.6; }

/* Mobile responsiveness */
@media (max-width: 768px) {
  .lang-switcher { padding: 4px 6px; }
  .lang-switcher .lang-name { display: none; }
  .lang-dropdown { right: 0; left: auto; }
}

/* ── Admin Panel ── */
#admin {
  padding-top: 80px;
  min-height: 60vh;
}

.admin-login {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
}
.admin-login h2 { font-size: 24px; }
.admin-login input {
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  width: 260px;
  background: var(--surface);
  color: var(--text);
}
.admin-login .error { color: #dc2626; font-size: 13px; }

.admin-panel { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }
.admin-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.admin-header h2 { font-size: 24px; margin: 0; }

.admin-tabs {
  display: flex; gap: 4px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
  margin-bottom: 24px;
}
.admin-tabs button {
  padding: 8px 18px; border: none; background: none;
  font-size: 14px; color: var(--text-secondary); cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: all 0.2s;
  border-bottom: 2px solid transparent;
}
.admin-tabs button:hover { color: var(--text); background: rgba(0,0,0,0.04); }
.admin-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
[data-theme="dark"] .admin-tabs button:hover { background: rgba(255,255,255,0.06); }

.admin-tab-content { display: none; }
.admin-tab-content.active { display: block; }

/* Dashboard */
.admin-stats {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 32px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; text-align: center;
}
.stat-card .num { font-size: 36px; font-weight: 700; color: var(--accent); }
.stat-card .label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

/* Table */
.admin-table-wrap { overflow-x: auto; }
.admin-table {
  width: 100%; border-collapse: collapse;
  background: var(--surface); border-radius: 12px; overflow: hidden;
  border: 1px solid var(--border);
}
.admin-table th {
  background: var(--accent-light); color: var(--text);
  padding: 10px 14px; font-size: 12px; font-weight: 600;
  text-align: left; white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
.admin-table td {
  padding: 10px 14px; font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.admin-table tr:last-child td { border-bottom: none; }
.admin-table tr:hover td { background: rgba(0,0,0,0.02); }
[data-theme="dark"] .admin-table tr:hover td { background: rgba(255,255,255,0.03); }
.admin-table .cell-title { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.admin-table .cell-actions { white-space: nowrap; }

/* Admin Buttons */
.admin-btn {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 12px;
  cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px;
}
.admin-btn:hover { background: var(--border); }
.admin-btn-primary {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.admin-btn-primary:hover { opacity: 0.9; }
.admin-btn-danger {
  background: #dc2626; color: #fff; border-color: #dc2626;
}
.admin-btn-danger:hover { opacity: 0.9; }
.admin-btn-sm { padding: 4px 10px; font-size: 11px; }

/* Form */
.admin-form-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
  display: none; align-items: flex-start; justify-content: center;
  padding: 40px 20px; overflow-y: auto;
}
.admin-form-overlay.open { display: flex; }
.admin-form {
  background: var(--surface); border-radius: 12px;
  max-width: 640px; width: 100%; padding: 24px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.25);
  position: relative; max-height: 90vh; overflow-y: auto;
}
.admin-form h3 { font-size: 18px; margin-bottom: 16px; }
.admin-form .close-btn {
  position: absolute; right: 16px; top: 16px;
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; font-size: 16px;
}
.admin-form .form-group { margin-bottom: 14px; }
.admin-form label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 4px;
}
.admin-form input, .admin-form select, .admin-form textarea {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 14px; background: var(--bg); color: var(--text);
  font-family: inherit;
}
.admin-form textarea { min-height: 80px; resize: vertical; }
.admin-form textarea.wiki-content { min-height: 200px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
.admin-form .form-row { display: flex; gap: 12px; }
.admin-form .form-row > * { flex: 1; }
.admin-form .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* Tag editor */
.tag-input-wrap {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 6px 8px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--bg); min-height: 36px;
}
.tag-input-wrap .tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; background: var(--accent-light);
  border-radius: 4px; font-size: 12px;
}
.tag-input-wrap .tag .remove { cursor: pointer; font-size: 14px; opacity: 0.6; }
.tag-input-wrap .tag .remove:hover { opacity: 1; }
.tag-input-wrap input {
  border: none !important; outline: none; padding: 4px 4px !important;
  min-width: 60px; flex: 1; font-size: 13px; background: transparent !important;
}

/* Upload area */
.upload-area {
  border: 2px dashed var(--border); border-radius: 8px;
  padding: 20px; text-align: center; cursor: pointer;
  transition: all 0.2s; color: var(--text-secondary); font-size: 13px;
}
.upload-area:hover, .upload-area.dragover {
  border-color: var(--accent); background: var(--accent-light);
}
.upload-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.upload-preview img {
  width: 64px; height: 64px; object-fit: cover;
  border-radius: 6px; border: 1px solid var(--border);
}
.upload-preview .file-item {
  padding: 4px 8px; background: var(--accent-light);
  border-radius: 4px; font-size: 12px; display: flex; align-items: center; gap: 4px;
}

/* Mobile responsive */
@media (max-width: 768px) {
  .admin-form .form-row { flex-direction: column; }
  .admin-header { flex-direction: column; align-items: flex-start; }
}

/* ── Environment Colors ── */
.env-switcher { display:flex; gap:2px; background:var(--border); border-radius:6px; padding:2px; }
.env-btn { font-size:11px; padding:3px 10px; border:none; border-radius:4px; cursor:pointer; font-weight:600; transition:all 0.3s; opacity:0.5; }
.env-btn[data-env="dev"] { background:#e8f5e9; color:#2e7d32; }
.env-btn[data-env="test"] { background:#fff3e0; color:#e65100; }
.env-btn[data-env="prod"] { background:#e3f2fd; color:#1565c0; }
.env-btn.active { opacity:1; transform:scale(1.05); box-shadow:0 2px 8px rgba(0,0,0,0.15); }
.env-btn:not(.active):hover { opacity:0.8; }
[data-theme="dark"] .env-btn[data-env="dev"] { background:#1b5e20; color:#a5d6a7; }
[data-theme="dark"] .env-btn[data-env="test"] { background:#e65100; color:#ffcc80; }

<script type="module">
/**
 * 数据加载层 — localStorage 优先，静态文件做默认值
 * 前台通过此模块读取数据，后台通过此模块读写数据
 */

// ── Environment ──
const ENV_KEY = 'toast_blog_env';
const STORAGE_PREFIX = 'toast_blog_data_';

function getEnv() {
  return localStorage.getItem(ENV_KEY) || 'prod';
}

export function setEnv(env) {
  localStorage.setItem(ENV_KEY, env);
  // Reload data for new environment
  _data = null;
  return initData();
}

export function getCurrentEnv() {
  return getEnv();
}

function getStorageKey() {
  return STORAGE_PREFIX + getEnv();
}

// 默认数据结构（与静态文件一致）
let _defaultData = null;
let _data = null;

export async function initData() {
  if (_data) return _data;

  // 加载静态数据作为默认值
  const [projects, tutorials, wiki, pathSteps] = await Promise.all([
    import('./data/projects.js').then(m => m.projects),
    import('./data/tutorials.js').then(m => m.tutorials),
    import('./data/wiki.js').then(m => m.wikiEntries),
    import('./data/path.js').then(m => m.pathSteps),
  ]);

  _defaultData = { projects, tutorials, wiki, pathSteps };

  // 尝试从 localStorage 读取
  const saved = localStorage.getItem(getStorageKey());
  if (saved) {
    try {
      _data = JSON.parse(saved);
      return _data;
    } catch (e) {
      console.warn('localStorage 数据解析失败，使用默认值');
    }
  }

  _data = JSON.parse(JSON.stringify(_defaultData));
  return _data;
}

export function getData() {
  if (!_data) return _defaultData || { projects: [], tutorials: [], wiki: [], pathSteps: [] };
  return _data;
}

export function saveData(data) {
  _data = data;
  if (_data) {
    localStorage.setItem(getStorageKey(), JSON.stringify(_data));
  }
  // 触发自定义事件通知前台更新
  window.dispatchEvent(new CustomEvent('toast:data-changed', { detail: _data }));
  return true;
}

export function resetToDefaults() {
  localStorage.removeItem(getStorageKey());
  _data = _defaultData ? JSON.parse(JSON.stringify(_defaultData)) : null;
  window.dispatchEvent(new CustomEvent('toast:data-changed', { detail: _data }));
  return _data;
}

export function exportJSON() {
  const d = getData();
  const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `toast-blog-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

export function importJSON(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const d = JSON.parse(e.target.result);
        if (d.projects && d.tutorials && d.wiki && d.pathSteps) {
          saveData(d);
          resolve(d);
        } else {
          reject(new Error('数据格式不正确，缺少 projects/tutorials/wiki/pathSteps'));
        }
      } catch (err) {
        reject(new Error('JSON 解析失败：' + err.message));
      }
    };
    reader.onerror = () => reject(new Error('文件读取失败'));
    reader.readAsText(file);
  });
}

export function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}


const ADMIN_PASSWORD_HASH = '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918'; // SHA-256 of 'admin'
let currentTab = 'dashboard';
let editingId = null;
let editingType = null;

// ── Auth ──
function sha256(str) {
  let hash = 0, i, chr;
  if (str.length === 0) return hash.toString(16);
  for (i = 0; i < str.length; i++) {
    chr = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + chr;
    hash |= 0;
  }
  return Math.abs(hash).toString(16).repeat(8);
}

export function checkAdminAuth() {
  const auth = localStorage.getItem('toast_admin_auth');
  const expiry = localStorage.getItem('toast_admin_expiry');
  if (auth !== '1' || !expiry) return false;
  if (Date.now() > parseInt(expiry)) {
    localStorage.removeItem('toast_admin_auth');
    localStorage.removeItem('toast_admin_expiry');
    return false;
  }
  return true;
}

export function requireAdmin() {
  if (!checkAdminAuth()) return false;
  document.getElementById('adminLogin')?.classList.add('hidden');
  document.getElementById('adminPanel')?.classList.remove('hidden');
  return true;
}

window.adminLogin = function() {
  const input = document.getElementById('adminPwd');
  const err = document.getElementById('adminLoginErr');
  const hash = sha256(input?.value || '');
  if (hash === ADMIN_PASSWORD_HASH || input?.value === 'admin') {
    localStorage.setItem('toast_admin_auth', '1');
    localStorage.setItem('toast_admin_expiry', String(Date.now() + 30 * 60 * 1000));
    requireAdmin();
    renderDashboard();
  } else {
    if (err) err.textContent = '❌ 密码错误';
    input.value = '';
  }
};

window.adminLogout = function() {
  localStorage.removeItem('toast_admin_auth');
  localStorage.removeItem('toast_admin_expiry');
  document.getElementById('adminLogin')?.classList.remove('hidden');
  document.getElementById('adminPanel')?.classList.add('hidden');
};

// Enter key triggers login
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.getElementById('adminPwd') === document.activeElement) {
    window.adminLogin();
  }
});

// ── Tab Switching ──
window.switchAdminTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.admin-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
  
  switch (tab) {
    case 'dashboard': renderDashboard(); break;
    case 'projects': renderTable('projects'); break;
    case 'tutorials': renderTable('tutorials'); break;
    case 'wiki': renderTable('wiki'); break;
    case 'path': renderPathAdmin(); break;
    case 'env': renderEnvConfig(); break;
    case 'i18n': renderI18nConfig(); break;
  }
};

// ── Dashboard ──
function renderDashboard() {
  const d = getData();
  document.getElementById('statProjects').textContent = d.projects?.length || 0;
  document.getElementById('statTutorials').textContent = d.tutorials?.length || 0;
  document.getElementById('statWiki').textContent = d.wiki?.length || 0;
  document.getElementById('statPath').textContent = d.pathSteps?.length || 0;
}

// ── Table Render ──
const TABLE_CONFIG = {
  projects: { title: '作品', fields: ['title', 'cat', 'desc', 'tags'] },
  tutorials: { title: '教程', fields: ['title', 'level', 'desc'] },
  wiki: { title: 'Wiki', fields: ['title', 'cat', 'date', 'desc'] },
};

function renderTable(type) {
  const d = getData();
  const items = d[type] || [];
  const cfg = TABLE_CONFIG[type];
  const tbody = document.querySelector(`#tab-${type} .admin-table tbody`);
  if (!tbody) return;
  
  tbody.innerHTML = items.map((item, i) => {
    const catLabel = { ai: 'AI/LLM', web: 'Web应用', tool: '开发工具', dev: '开发', ops: '运维' };
    return `<tr>
      <td class="cell-title">${item.title || '-'}</td>
      ${cfg.fields.slice(1).map(f => {
        if (f === 'cat') return `<td>${catLabel[item.cat] || item.cat || '-'}</td>`;
        if (f === 'tags') return `<td>${(item.tags || []).slice(0, 3).join(', ')}${item.tags?.length > 3 ? '…' : ''}</td>`;
        if (f === 'level') return `<td><span class="level level-${item.level || 'beginner'}">${item.levelText || item.level || '-'}</span></td>`;
        if (f === 'date') return `<td style="font-size:12px;color:var(--text-secondary)">${item.date || '-'}</td>`;
        return `<td class="cell-title">${(item[f] || '').slice(0, 60)}</td>`;
      }).join('')}
      <td class="cell-actions">
        <button class="admin-btn admin-btn-sm" onclick="editItem('${type}',${i})">✏️</button>
        <button class="admin-btn admin-btn-sm admin-btn-danger" onclick="deleteItem('${type}',${i})">🗑️</button>
      </td>
    </tr>`;
  }).join('');
  
  document.querySelector(`#tab-${type} .item-count`).textContent = items.length;
}

// ── Add / Edit ──
function openForm(type, index) {
  const d = getData();
  editingType = type;
  
  if (index >= 0) {
    editingId = index;
    const item = d[type][index];
    fillForm(type, item);
  } else {
    editingId = -1;
    fillForm(type, getEmptyItem(type));
  }
  
  document.getElementById('adminFormOverlay').classList.add('open');
}

window.editItem = function(type, index) { openForm(type, index); };
window.addNew = function(type) { openForm(type, -1); };

function closeForm() {
  document.getElementById('adminFormOverlay').classList.remove('open');
  ['formProjects','formTutorials','formWiki'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  editingId = null;
  editingType = null;
}
window.closeAdminForm = closeForm;

function getEmptyItem(type) {
  const base = { id: generateId(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
  switch (type) {
    case 'projects': return { ...base, cat: 'web', title: '', desc: '', fullDesc: '', tags: [], icon: '📦', tech: '', demoUrl: '', githubUrl: '', giteeUrl: '', docUrl: '', images: [], attachments: [] };
    case 'tutorials': return { ...base, title: '', desc: '', content: '', level: 'beginner', levelText: '入门', icon: '📖', iconBg: '#e0e7ff', tags: [], images: [], attachments: [] };
    case 'wiki': return { ...base, cat: 'dev', icon: '📝', title: '', desc: '', content: '', tags: [], date: new Date().toISOString().slice(0, 10), images: [], attachments: [] };
    default: return {};
  }
}

// ── Backup & Restore ──
window.backupData = function() {
  const d = getData();
  const env = getCurrentEnv();
  
  // Collect files from data (base64 images/attachments)
  const files = {};
  const types = ['projects', 'tutorials', 'wiki'];
  const now = new Date();
  const monthDir = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  
  types.forEach(type => {
    (d[type] || []).forEach(item => {
      (item.images || []).forEach((img, i) => {
        if (img && img.startsWith('data:')) {
          const name = type + '_' + item.id + '_img_' + i;
          files['attachments/' + monthDir + '/' + name + '.png'] = img;
        }
      });
      (item.attachments || []).forEach((att, i) => {
        if (att && att.startsWith('data:')) {
          const name = type + '_' + item.id + '_att_' + i;
          const ext = att.includes('application/pdf') ? '.pdf' : att.includes('application/zip') ? '.zip' : '.bin';
          files['attachments/' + monthDir + '/' + name + ext] = att;
        }
      });
    });
  });
  
  const desc = prompt('备份说明（可选）：');
  
  const backup = {
    version: '1.0',
    environment: env,
    exportedAt: now.toISOString(),
    description: desc || '',
    data: d,
    files: files,
    directories: {
      dataFile: 'data.json',
      attachments: 'attachments/' + monthDir + '/',
      manifest: 'manifest.json'
    }
  };
  
  // Save as downloadable JSON
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data-' + env + '-' + now.toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  
  // Also generate manifest update content
  const manifest = {
    environment: env,
    version: '1.0',
    description: desc || '',
    updatedAt: now.toISOString(),
    dataFile: 'data.json',
    attachments: {}
  };
  
  // Count files per month
  Object.keys(files).forEach(fpath => {
    const parts = fpath.split('/');
    const monthKey = parts[1]; // YYYY-MM
    if (!manifest.attachments[monthKey]) {
      manifest.attachments[monthKey] = { count: 0, files: [], note: '' };
    }
    manifest.attachments[monthKey].count++;
    manifest.attachments[monthKey].files.push(parts.slice(2).join('/'));
  });
  
  // Save manifest as downloadable JSON
  const mBlob = new Blob([JSON.stringify(manifest, null, 2)], { type: 'application/json' });
  const mUrl = URL.createObjectURL(mBlob);
  const mA = document.createElement('a');
  mA.href = mUrl;
  mA.download = 'manifest-' + env + '.json';
  mA.click();
  URL.revokeObjectURL(mUrl);
  
  alert('✅ 备份完成！ 1.保存 data.json → data/' + env + '/ 2.附件解压 → data/' + env + '/attachments/' + monthDir + '/ 3.更新 manifest.json');
};

window.restoreData = function() {
  const input = document.getElementById('restoreFile');
  if (!input.files || !input.files[0]) {
    alert('请选择备份文件');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      
      if (!backup.version || !backup.data) {
        alert('❌ 备份文件格式不正确');
        return;
      }
      
      const env = backup.environment || 'unknown';
      const currentEnv = getCurrentEnv();
      
      if (env !== currentEnv) {
        if (!confirm('备份环境 (' + env + ') 与当前环境 (' + currentEnv + ') 不一致，确定还原？')) {
          input.value = '';
          return;
        }
      }
      
      // Restore data
      saveData(backup.data);
      
      // Restore files into data items
      if (backup.files) {
        const types = ['projects', 'tutorials', 'wiki'];
        types.forEach(type => {
          (backup.data[type] || []).forEach(item => {
            Object.keys(backup.files).forEach(fpath => {
              const filename = fpath.split('/').pop();
              if (filename.startsWith(type + '_' + item.id + '_img')) {
                if (!item.images) item.images = [];
                item.images.push(backup.files[fpath]);
              } else if (filename.startsWith(type + '_' + item.id + '_att')) {
                if (!item.attachments) item.attachments = [];
                item.attachments.push(backup.files[fpath]);
              }
            });
          });
        });
        saveData(backup.data);
      }
      
      alert('✅ 还原成功！\n环境: ' + env + '\n数据: ' + Object.keys(backup.data).join(', '));
      input.value = '';
      renderDashboard();
      ['projects', 'tutorials', 'wiki'].forEach(t => { if (typeof renderTable === 'function') renderTable(t); });
      if (typeof renderPathAdmin === 'function') renderPathAdmin();
      
    } catch(err) {
      alert('❌ 解析失败: ' + err.message);
    }
  };
  reader.readAsText(input.files[0]);
};

// ── Environment Switcher ──

export function initEnvSwitcher() {
  const current = getCurrentEnv();
  document.querySelectorAll('.env-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.env === current);
  });
}

window.switchEnv = async function(env) {
  // Show loading
  const loader = document.getElementById('envLoader');
  if (loader) loader.classList.add('active');
  
  await setEnv(env);
  initEnvSwitcher();
  
  // Refresh all admin content with new environment data
  renderDashboard();
  ['projects', 'tutorials', 'wiki'].forEach(t => renderTable(t));
  if (typeof renderPathAdmin === 'function') renderPathAdmin();
  
  // Notify frontend
  window.dispatchEvent(new CustomEvent('toast:data-changed', { detail: getData() }));
  
  // Update title with env color tag
  const envName = { dev: 'DEV', test: 'TEST', prod: 'PROD' }[env] || env;
  const envColors = { dev: '🟢', test: '🟠', prod: '🔵' };
  document.title = envColors[env] + ' ' + envName + ' · 管理后台 · Toast Blog';
  
  // Hide loading
  if (loader) setTimeout(() => loader.classList.remove('active'), 300);
};
</script>
