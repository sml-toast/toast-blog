<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <base href="/toast-blog/">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>管理后台 · Toast Blog</title>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/admin.css">
<link rel="icon" type="image/svg+xml" href="/logo/toast-favicon.svg">

</head>
<body>

<!-- ── Admin Section ── -->
<section id="admin" aria-label="后台管理">
  <div class="container">

    <!-- Login -->
    <div id="adminLogin" class="admin-login">
      <h2>🔐 管理后台</h2>
      <p style="color:var(--text-secondary);font-size:13px">请输入管理密码</p>
      <input type="password" id="adminPwd" placeholder="密码" autocomplete="off">
      <button class="btn btn-primary" onclick="adminLogin()">登录</button>
      <div id="adminLoginErr" class="error"></div>
    </div>

    <!-- Panel -->
    <div id="adminPanel" class="hidden admin-panel">
      <div class="admin-header">
        <h2>⚙️ 管理后台</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="admin-btn" onclick="exportData()">📥 导出 JSON</button>
          <label class="admin-btn" style="cursor:pointer">📤 导入 JSON
            <input type="file" id="importFile" accept=".json" onchange="importData()" style="display:none">
          </label>
          <button class="admin-btn admin-btn-danger" onclick="resetData()">🔄 重置默认</button>
          <button class="admin-btn" onclick="adminLogout()">🚪 退出</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="admin-tabs">
        <button data-tab="dashboard" class="active" onclick="switchAdminTab('dashboard')">📊 概览</button>
        <button data-tab="projects" onclick="switchAdminTab('projects')">📦 作品</button>
        <button data-tab="tutorials" onclick="switchAdminTab('tutorials')">📖 教程</button>
        <button data-tab="wiki" onclick="switchAdminTab('wiki')">📝 Wiki</button>
        <button data-tab="path" onclick="switchAdminTab('path')">🧭 学习路线</button>
      </div>

      <!-- Dashboard -->
      <div id="tab-dashboard" class="admin-tab-content active">
        <div class="admin-stats">
          <div class="stat-card"><div class="num" id="statProjects">0</div><div class="label">📦 作品</div></div>
          <div class="stat-card"><div class="num" id="statTutorials">0</div><div class="label">📖 教程</div></div>
          <div class="stat-card"><div class="num" id="statWiki">0</div><div class="label">📝 Wiki</div></div>
          <div class="stat-card"><div class="num" id="statPath">0</div><div class="label">🧭 学习路线</div></div>
        </div>
        <p style="color:var(--text-secondary);font-size:13px">💡 数据存储在浏览器本地（localStorage），导出 JSON 备份以防丢失。</p>
      </div>

      <!-- Projects Table -->
      <div id="tab-projects" class="admin-tab-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:14px;color:var(--text-secondary)">共 <span class="item-count">0</span> 个作品</span>
          <button class="admin-btn admin-btn-primary" onclick="addNew('projects')">＋ 新增</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>标题</th><th>分类</th><th>描述</th><th>标签</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Tutorials Table -->
      <div id="tab-tutorials" class="admin-tab-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:14px;color:var(--text-secondary)">共 <span class="item-count">0</span> 篇教程</span>
          <button class="admin-btn admin-btn-primary" onclick="addNew('tutorials')">＋ 新增</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>标题</th><th>难度</th><th>描述</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Wiki Table -->
      <div id="tab-wiki" class="admin-tab-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:14px;color:var(--text-secondary)">共 <span class="item-count">0</span> 条笔记</span>
          <button class="admin-btn admin-btn-primary" onclick="addNew('wiki')">＋ 新增</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>标题</th><th>分类</th><th>日期</th><th>描述</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Learning Path -->
      <div id="tab-path" class="admin-tab-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:14px;color:var(--text-secondary)">共 <span class="item-count">0</span> 步</span>
          <button class="admin-btn admin-btn-primary" onclick="addPath()">＋ 新增</button>
        </div>
        <div id="pathList"></div>
      </div>

    </div>
  </div>
</section>

<!-- Admin Form Modal -->
<div class="admin-form-overlay" id="adminFormOverlay" onclick="if(event.target===this)closeAdminForm()">
  <!-- Project Form -->
  <div id="formProjects" class="admin-form" style="display:none">
    <button class="close-btn" onclick="closeAdminForm()">✕</button>
    <h3>编辑作品</h3>
    <div class="form-group"><label>分类</label><select id="pf_cat"><option value="ai">AI / LLM</option><option value="web" selected>Web 应用</option><option value="tool">开发工具</option></select></div>
    <div class="form-group"><label>标题</label><input type="text" id="pf_title" placeholder="项目名称"></div>
    <div class="form-group"><label>图标 (emoji)</label><input type="text" id="pf_icon" placeholder="🤖"></div>
    <div class="form-group"><label>简短描述</label><input type="text" id="pf_desc" placeholder="简短的项目描述"></div>
    <div class="form-group"><label>详细描述</label><textarea id="pf_fullDesc" rows="3"></textarea></div>
    <div class="form-group"><label>技术标签</label><div class="tag-input-wrap" id="pf_tags"><input type="text" placeholder="输入后按回车添加" onkeydown="adminTagInput(this,event)"></div></div>
    <div class="form-group"><label>技术栈文本</label><input type="text" id="pf_tech" placeholder="React · Node.js"></div>
    <div class="form-group"><label>Demo URL</label><input type="url" id="pf_demoUrl" placeholder="https://"></div>
    <div class="form-group"><label>GitHub URL</label><input type="url" id="pf_githubUrl" placeholder="https://github.com/"></div>
    <div class="form-group"><label>Gitee URL</label><input type="url" id="pf_giteeUrl" placeholder="https://gitee.com/"></div>
    <div class="form-group"><label>文档 URL</label><input type="url" id="pf_docUrl" placeholder="https://"></div>
    <div class="form-actions"><button type="button" class="admin-btn" onclick="closeAdminForm()">取消</button><button type="button" class="admin-btn admin-btn-primary" onclick="saveProject()">保存</button></div>
  </div>

  <!-- Tutorial Form -->
  <div id="formTutorials" class="admin-form" style="display:none">
    <button class="close-btn" onclick="closeAdminForm()">✕</button>
    <h3>编辑教程</h3>
    <div class="form-group"><label>标题</label><input type="text" id="tf_title" placeholder="教程标题"></div>
    <div class="form-group"><label>简短描述</label><input type="text" id="tf_desc" placeholder="简短描述"></div>
    <div class="form-row"><div class="form-group" style="flex:1"><label>难度</label><select id="tf_level"><option value="beginner" selected>入门</option><option value="intermediate">进阶</option><option value="advanced">高级</option></select></div>
    <div class="form-group" style="flex:1"><label>难度文本</label><input type="text" id="tf_levelText" placeholder="入门 / 进阶 / 高级"></div></div>
    <div class="form-row"><div class="form-group" style="flex:1"><label>图标 (emoji)</label><input type="text" id="tf_icon" placeholder="📖"></div>
    <div class="form-group" style="flex:1"><label>图标背景色</label><input type="text" id="tf_iconBg" placeholder="#e0e7ff"></div></div>
    <div class="form-group"><label>标签</label><div class="tag-input-wrap" id="tf_tags"><input type="text" placeholder="输入后按回车添加" onkeydown="adminTagInput(this,event)"></div></div>
    <div class="form-group"><label>内容 (Markdown)</label><textarea id="tf_content" rows="10" class="wiki-content" placeholder="支持 Markdown 语法"></textarea></div>
    <div class="form-actions"><button type="button" class="admin-btn" onclick="closeAdminForm()">取消</button><button type="button" class="admin-btn admin-btn-primary" onclick="saveTutorial()">保存</button></div>
  </div>

  <!-- Wiki Form -->
  <div id="formWiki" class="admin-form" style="display:none">
    <button class="close-btn" onclick="closeAdminForm()">✕</button>
    <h3>编辑 Wiki</h3>
    <div class="form-group"><label>分类</label><select id="wf_cat"><option value="dev" selected>开发</option><option value="ai">AI</option><option value="ops">运维</option><option value="tool">工具</option></select></div>
    <div class="form-group"><label>标题</label><input type="text" id="wf_title" placeholder="笔记标题"></div>
    <div class="form-group"><label>简短描述</label><input type="text" id="wf_desc" placeholder="简短描述"></div>
    <div class="form-row"><div class="form-group" style="flex:1"><label>图标 (emoji)</label><input type="text" id="wf_icon" placeholder="📝"></div>
    <div class="form-group" style="flex:1"><label>日期</label><input type="date" id="wf_date"></div></div>
    <div class="form-group"><label>标签</label><div class="tag-input-wrap" id="wf_tags"><input type="text" placeholder="输入后按回车添加" onkeydown="adminTagInput(this,event)"></div></div>
    <div class="form-group"><label>内容 (Markdown)</label><textarea id="wf_content" rows="12" class="wiki-content" placeholder="支持 Markdown 语法"></textarea></div>
    <div class="form-actions"><button type="button" class="admin-btn" onclick="closeAdminForm()">取消</button><button type="button" class="admin-btn admin-btn-primary" onclick="saveWiki()">保存</button></div>
  </div>
</div>

<!-- Path Form Modal -->
<div class="admin-form-overlay" id="pathFormOverlay">
  <div class="admin-form">
    <button class="close-btn" onclick="closePathForm()">✕</button>
    <h3>编辑学习路线</h3>
    <div class="form-group">
      <label>阶段标签</label>
      <input type="text" id="pathLabel" data-field="label" placeholder="如：Phase 1">
    </div>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="pathTitle" data-field="title" placeholder="如：前端基础">
    </div>
    <div class="form-group">
      <label>描述</label>
      <textarea id="pathDesc" data-field="desc" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>技术标签</label>
      <div class="tag-input-wrap" data-field="techs">
        <input type="text" placeholder="输入后按回车添加" onkeydown="adminTagInput(this,event)">
      </div>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="pathCompleted"> 已完成</label>
    </div>
    <div class="form-actions">
      <button class="admin-btn" onclick="closePathForm()">取消</button>
      <button class="admin-btn admin-btn-primary" onclick="savePath()">保存</button>
    </div>
  </div>
</div>

  <script type="module" src="/admin.js"></script>
</body>
</html>
